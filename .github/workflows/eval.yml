name: Eval gate

# Runs on a weekly schedule and can be triggered manually.
# Generation eval requires GROQ_API_KEY; if the secret is absent the eval script
# falls back to --skip-generation and only retrieval metrics are gated.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC

jobs:
  eval:
    runs-on: ubuntu-latest
    env:
      QDRANT_URL: ":memory:"
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"

      - run: uv sync --extra dev

      - name: Run eval (skip generation if no API key)
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "GROQ_API_KEY not set — running retrieval-only eval"
            uv run python scripts/run_eval.py --skip-generation
          else
            uv run python scripts/run_eval.py
          fi

      - name: Check eval gate
        run: uv run python scripts/check_eval_gate.py
